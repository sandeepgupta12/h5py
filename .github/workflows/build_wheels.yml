      #       deactivate
      #       rm -rf build dist .mesonpy-* _skbuild
      #     done

      # - name: ⚙️ Setup venv and build h5py wheels (ppc64le)
      #   if: matrix.arch == 'ppc64le'
      #   run: |
      #     echo "Creating Python 3.12 virtual environment..."
      #     python3.12 -m venv venv
      #     source venv/bin/activate

      #     echo "⬆Installing build tools..."
      #     pip install -U pip setuptools wheel cibuildwheel

      #     echo "Building h5py wheels with cibuildwheel..."
      #     cibuildwheel
      #   env:
      #     CIBW_ARCHS: ppc64le
      #     #CIBW_BUILD: "cp311-manylinux_ppc64le cp312-manylinux_ppc64le cp313-manylinux_ppc64le cp314-manylinux_ppc64le"
